<div class="top">
  <div class="left">
    <ng-container *ngIf="isMainPage; else backButton">
      {{ user?.name?.toUpperCase() }}
    </ng-container>
    <ng-template #backButton>
      <div class="back-title-block">
        <mat-icon
          (click)="goBack()"
          class="icon back-icon"
          aria-hidden="false"
          aria-label="Назад"
          fontIcon="arrow_back">
        </mat-icon>
        <h1 class="page-title" *ngIf="!isFriendMoviesPage; else friendMoviesTitle">{{ pageTitle }}</h1>
        <ng-template #friendMoviesTitle>
          <div class="page-title-group">
            <h1 class="page-title">{{ pageTitle }}</h1>
            <span class="page-title-accent" *ngIf="friendMoviesOwnerNickname">{{ friendMoviesOwnerNickname }}</span>
          </div>
        </ng-template>
      </div>
    </ng-template>
  </div>
  <div class="right">
    <span class="page-meta" *ngIf="isFriendMoviesPage && friendMoviesTotal !== null">
      {{ friendMoviesTotal }} {{ friendMoviesCountLabel }}
    </span>
    <mat-icon *ngIf="isMovieListPage"
              (click)="openFriends()"
              class="icon"
              aria-hidden="false"
              aria-label="Друзья"
              fontIcon="people">
    </mat-icon>
    <mat-icon *ngIf="isMovieListPage"
              (click)="addMovie()"
              class="icon"
              aria-hidden="false"
              aria-label="Добавить фильм"
              fontIcon="add">
    </mat-icon>
    <mat-icon *ngIf="isMovieListPage"
              (click)="toggleMovieViewMode()"
              class="icon"
              aria-hidden="false"
              aria-label="Переключить вид списка"
              [fontIcon]="movieViewMode === 'list' ? 'grid_view' : 'view_agenda'">
    </mat-icon>
    <mat-icon *ngIf="isMainPage"
              (click)="editMainPage()"
              class="icon"
              aria-hidden="false"
              aria-label="Настройки"
              fontIcon="settings">
    </mat-icon>
    <mat-icon *ngIf="isMainPage"
              (click)="logout()"
              class="icon"
              aria-hidden="false"
              aria-label="Выйти"
              fontIcon="logout">
    </mat-icon>
    <mat-icon *ngIf="isHomeRootPage"
              (click)="openHomeSettings()"
              class="icon"
              aria-hidden="false"
              aria-label="Настройки дома"
              fontIcon="settings">
    </mat-icon>
    <mat-icon *ngIf="isHomeRoomsPage"
              (click)="addRoom()"
              class="icon"
              aria-hidden="false"
              aria-label="Добавить комнату"
              fontIcon="add">
    </mat-icon>
    <mat-icon *ngIf="isHomeDevicesPage || isHomeSensorsPage"
              (click)="addHomeWidget()"
              class="icon"
              aria-hidden="false"
              aria-label="Добавить"
              fontIcon="add">
    </mat-icon>
    <mat-icon *ngIf="homeRoomId"
              (click)="openRoomSettings()"
              class="icon"
              aria-hidden="false"
              aria-label="Настройки комнаты"
              fontIcon="settings">
    </mat-icon>
  </div>
</div>
