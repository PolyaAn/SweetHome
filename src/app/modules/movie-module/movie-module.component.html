<section class="movie-module">
  <section class="movie-toolbar">
    <div class="movie-search-row">
      <label class="movie-search-field">
        <input
          type="text"
          [value]="draftSearchQuery"
          (input)="onSearchInput($any($event.target).value)"
          placeholder="Поиск по названию и комментарию"
        />
        <button type="button" *ngIf="draftSearchQuery" class="movie-search-clear" (click)="clearSearch()">
          <mat-icon fontIcon="close"></mat-icon>
        </button>
      </label>

      <button type="button" class="movie-toolbar-button" (click)="toggleFilters()">
        <mat-icon fontIcon="filter_alt"></mat-icon>
        <span>Фильтры</span>
        <span class="movie-toolbar-badge" *ngIf="activeFiltersCount">{{ activeFiltersCount }}</span>
      </button>
    </div>

    <section class="movie-filters" *ngIf="showFilters">
      <div class="movie-filter-group">
        <span class="movie-filter-label">Тип</span>
        <div class="movie-chip-list">
          <button
            type="button"
            class="movie-chip"
            [class.movie-chip--active]="filters.contentTypes.includes(type.code)"
            *ngFor="let type of dictionaries.contentTypes"
            (click)="toggleContentType(type.code)">
            {{ type.name }}
          </button>
        </div>
      </div>

      <div class="movie-filter-group">
        <span class="movie-filter-label">Жанры</span>
        <div class="movie-chip-list">
          <button
            type="button"
            class="movie-chip"
            [class.movie-chip--active]="filters.genres.includes(genre)"
            *ngFor="let genre of dictionaries.genres"
            (click)="toggleGenre(genre)">
            {{ genre }}
          </button>
        </div>
      </div>

      <div class="movie-filter-group">
        <span class="movie-filter-label">Страны</span>
        <div class="movie-chip-list">
          <button
            type="button"
            class="movie-chip"
            [class.movie-chip--active]="filters.countries.includes(country)"
            *ngFor="let country of dictionaries.countries"
            (click)="toggleCountry(country)">
            {{ country }}
          </button>
        </div>
      </div>

      <div class="movie-filter-grid">
        <label class="movie-filter-field">
          <span>Рейтинг от</span>
          <input type="number" min="0" max="10" step="0.1" [value]="filters.ratingFrom" (input)="updateRatingFrom($any($event.target).value)" />
        </label>

        <label class="movie-filter-field">
          <span>Рейтинг до</span>
          <input type="number" min="0" max="10" step="0.1" [value]="filters.ratingTo" (input)="updateRatingTo($any($event.target).value)" />
        </label>
      </div>

      <div class="movie-filter-group">
        <span class="movie-filter-label">Сортировка</span>
        <div class="movie-chip-list">
          <button
            type="button"
            class="movie-chip"
            [class.movie-chip--active]="filters.sortBy === 'UPDATED_AT' && filters.sortDirection === 'DESC'"
            (click)="updateSort('UPDATED_AT', 'DESC')">
            Сначала новые
          </button>
          <button
            type="button"
            class="movie-chip"
            [class.movie-chip--active]="filters.sortBy === 'TITLE' && filters.sortDirection === 'ASC'"
            (click)="updateSort('TITLE', 'ASC')">
            По названию
          </button>
          <button
            type="button"
            class="movie-chip"
            [class.movie-chip--active]="filters.sortBy === 'RATING' && filters.sortDirection === 'DESC'"
            (click)="updateSort('RATING', 'DESC')">
            По рейтингу
          </button>
        </div>
      </div>

      <div class="movie-filter-actions">
        <button type="button" class="movie-secondary-button" (click)="resetFilters()">Сбросить</button>
        <button type="button" class="movie-primary-button" (click)="applyFilters()">Применить</button>
      </div>
    </section>
  </section>

  <section class="movie-state movie-state--loading" *ngIf="listLoading">
    <article class="movie-skeleton" *ngFor="let item of [1, 2, 3, 4]"></article>
  </section>

  <section class="movie-state" *ngIf="!listLoading && errorMessage">
    <p>{{ errorMessage }}</p>
    <button type="button" class="movie-primary-button" (click)="retry()">Повторить</button>
  </section>

  <section class="movie-state" *ngIf="!listLoading && !errorMessage && !movies.length && !searchQuery && !activeFiltersCount">
    <p>Фильмы пока не добавлены</p>
    <button type="button" class="movie-primary-button" (click)="addMovie()">Добавить фильм</button>
  </section>

  <section class="movie-state" *ngIf="!listLoading && !errorMessage && !movies.length && (searchQuery || activeFiltersCount)">
    <p>Ничего не найдено</p>
    <button type="button" class="movie-secondary-button" (click)="resetFilters()">Сбросить фильтры</button>
  </section>

  <section class="movie-list" [class.movie-list--grid]="viewMode === 'grid'" *ngIf="!listLoading && !errorMessage && movies.length">
    <article
      class="movie-card"
      [class.movie-card--grid]="viewMode === 'grid'"
      *ngFor="let movie of movies; trackBy: trackByMovieId"
      (click)="openMovie(movie.movieId)">
      <div class="movie-card__head">
        <h3>{{ movie.title }}</h3>
        <div class="movie-card__badge">
          <span>{{ getTypeLabel(movie.contentType) }}</span>
          <span *ngIf="movie.rating !== null && movie.rating !== undefined">| {{ movie.rating }}</span>
        </div>
      </div>

      <div class="movie-card__meta">
        <span class="movie-card__chip" *ngFor="let genre of movie.genres | slice:0:4">{{ genre }}</span>
      </div>

      <p class="movie-card__country" *ngIf="movie.country">{{ movie.country }}</p>
    </article>
  </section>

  <div class="movie-load-more" *ngIf="!listLoading && !errorMessage && movies.length && hasNext">
    <button type="button" class="movie-secondary-button" [disabled]="loadingMore" (click)="loadMore()">
      {{ loadingMore ? 'Загрузка...' : 'Показать ещё' }}
    </button>
  </div>
</section>
