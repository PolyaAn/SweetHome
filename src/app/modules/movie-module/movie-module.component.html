<section class="movie-module">
  <div class="movie-filters">
    <div class="movie-search-row">
      <input
        type="text"
        class="movie-filter-input"
        [value]="searchQuery"
        (input)="onSearchChange($any($event.target).value)"
        placeholder="Поиск по названию и комментарию"
      />
      <button
        type="button"
        class="movie-filter-toggle"
        *ngIf="isPhone"
        (click)="togglePhoneFilters()"
        [attr.aria-label]="showPhoneFilters ? 'Скрыть фильтры' : 'Показать фильтры'">
        <mat-icon [fontIcon]="showPhoneFilters ? 'filter_alt_off' : 'filter_alt'"></mat-icon>
      </button>
    </div>
    <div class="movie-filter-range" *ngIf="!isPhone || showPhoneFilters">
      <span>Рейтинг</span>
      <div class="movie-filter-fields">
        <label class="movie-filter-field">
          <span>от</span>
          <select
            class="movie-filter-select"
            [value]="minRating"
            (change)="onMinRatingChange($any($event.target).value)">
            <option
              *ngFor="let rating of ratingOptions"
              [value]="rating"
              [selected]="(rating + '') === minRating">
              {{ rating }}
            </option>
          </select>
        </label>
        <label class="movie-filter-field">
          <span>до</span>
          <select
            class="movie-filter-select"
            [value]="maxRating"
            (change)="onMaxRatingChange($any($event.target).value)">
            <option
              *ngFor="let rating of ratingOptions"
              [value]="rating"
              [selected]="(rating + '') === maxRating">
              {{ rating }}
            </option>
          </select>
        </label>
      </div>
    </div>
    <label class="movie-filter-field movie-filter-genre" *ngIf="!isPhone || showPhoneFilters">
      <span>Жанр</span>
      <select
        class="movie-filter-select"
        [value]="selectedGenreId"
        (change)="onGenreChange($any($event.target).value)">
        <option value="all">Любой жанр</option>
        <option *ngFor="let genre of genreOptions" [value]="genre.id">{{ genre.name }}</option>
      </select>
    </label>
  </div>

  <p *ngIf="!movies.length">Фильмы не найдены</p>
  <p *ngIf="movies.length && !filteredMovies.length">По вашему запросу ничего не найдено</p>

  <div class="movie-list" *ngIf="filteredMovies.length">
    <article class="movie-item" [class.movie-item--grid]="viewMode !== 'grid'" *ngFor="let movie of filteredMovies">
      <div
        class="movie-item__head"
        [class.movie-item__head--grid]="viewMode !== 'grid'"
        (click)="openMovieEdit(movie.id)">
        <div class="movie-item__title">
          <h3>{{ movie.name }}</h3>
        </div>
        <span class="movie-rating">{{ movie.types }}
          <span *ngIf="movie.rating"> |</span>
          <span *ngIf="movie.rating" class="rating"> {{ movie.rating }}</span>
<!--          <button-->
<!--            *ngIf="!movie.rating"-->
<!--            type="button"-->
<!--            class="movie-rating-add"-->
<!--            aria-label="Добавить рейтинг">-->
<!--            +-->
<!--          </button>-->
        </span>
      </div>
      <div class="movie-meta" [class.movie-meta--grid]="viewMode !== 'grid'">
        <div class="movie-meta-genres" *ngIf="getGenres(movie).length">
          <span class="movie-meta-genre" [class.movie-meta-genre--grid]="viewMode !== 'grid'" *ngFor="let genre of getGenres(movie)">
            {{ genre.name.toLocaleLowerCase() }}
          </span>
        </div>
      </div>
      <div *ngIf="viewMode === 'grid'">
      <p
        #commentBlock
        class="movie-comment"
        [attr.data-movie-id]="movie.id"
        [class.expanded]="isCommentExpanded(movie.id)"
        *ngIf="viewMode === 'grid' && movie.comment">
        {{ movie.comment }}
      </p>
      <button
        type="button"
        class="movie-comment-toggle"
        *ngIf="viewMode === 'grid' && movie.comment && showToggle(movie.id)"
        (click)="toggleComment(movie.id)">
        {{ isCommentExpanded(movie.id) ? 'Свернуть' : 'Показать еще' }}
      </button>
      </div>
    </article>
  </div>
</section>
