<main class="page" *ngIf="vm$ | async as vm">
  <section class="tabs">
    <button type="button" [class.active]="selectedTab === 'all'" (click)="setTab('all')">Все</button>
    <button type="button" [class.active]="selectedTab === 'devices'" (click)="setTab('devices')">Устройства</button>
    <button type="button" [class.active]="selectedTab === 'sensors'" (click)="setTab('sensors')">Датчики</button>
  </section>

  <ng-container *ngIf="uiState$ | async as state">
    <section class="list skeleton-list" *ngIf="state.loading; else deviceList">
      <div class="row" *ngFor="let item of [1, 2, 3]">
        <span class="icon skeleton"></span>
        <span class="copy">
          <span class="skeleton line"></span>
          <span class="skeleton line short"></span>
        </span>
        <span class="skeleton value"></span>
      </div>
    </section>

    <ng-template #deviceList>
      <section class="list" *ngIf="filtered(vm.widgets).length; else empty">
        <article class="row" *ngFor="let widget of filtered(vm.widgets)">
          <mat-icon [fontIcon]="widget.icon"></mat-icon>
          <div class="copy">
            <h2>{{ widget.name }}</h2>
            <p>{{ widget.entityId }}</p>
          </div>
          <span class="value">{{ widget.state }}{{ widget.unit ? ' ' + widget.unit : '' }}</span>
          <div class="controls">
            <label>
              <span>Комната</span>
              <select
                [value]="widget.roomId || ''"
                [disabled]="state.saving"
                (change)="changeRoom(widget.id, roomIdFromEvent($event))">
                <option value="">Без комнаты</option>
                <option *ngIf="selectedRoomMissing(widget, vm.rooms)" [value]="widget.roomId || ''">
                  Привязанная комната не найдена
                </option>
                <option *ngFor="let room of vm.rooms" [value]="room.id">{{ room.name }}</option>
              </select>
            </label>
            <button
              type="button"
              class="delete"
              [disabled]="state.saving"
              (click)="remove(widget.id)"
              aria-label="Удалить">
              <mat-icon fontIcon="delete"></mat-icon>
            </button>
          </div>
        </article>
      </section>

      <section class="empty error" *ngIf="state.error">{{ state.error }}</section>
    </ng-template>
  </ng-container>

  <ng-template #empty>
    <section class="empty">Список пуст</section>
  </ng-template>
</main>
