<section class="register-page">
  <div class="register-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="field-label" for="name">Логин (будет виден другим пользователям)</label>
      <input id="name" type="text" formControlName="name" placeholder="Логин"/>
      <div class="error" *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
        Введите имя (минимум 2 символа)
      </div>

      <label class="field-label" for="email">Почта</label>
      <input id="email" type="email" formControlName="email" placeholder="example@mail.com"/>
      <div class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
        Введите корректную почту
      </div>

      <label class="field-label" for="password">Пароль</label>
      <input id="password" type="password" formControlName="password" placeholder="Минимум 6 символов"/>
      <div class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
        Пароль должен содержать: минимум 6 символов, заглавную букву, строчную букву, цифра и спецсимвол
      </div>

      <label class="field-label" for="repeatPassword">Повторите пароль</label>
      <input id="repeatPassword" type="password" formControlName="repeatPassword" placeholder="Повторите пароль"/>
      <div class="error" *ngIf="form.get('repeatPassword')?.touched && !passwordsMatch">
        Пароли не совпадают
      </div>

      <div class="actions">
        <button type="submit" [disabled]="form.invalid || !passwordsMatch">Создать аккаунт</button>
      </div>
    </form>
  </div>
</section>
